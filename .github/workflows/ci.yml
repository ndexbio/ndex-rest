name: CI

on:
  push:
    branches: [master]
    tags:
      - 'docker*'
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build and unit test
        run: make test

  integration-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Integration test
        env:
          DOCKER_CACHE_ARGS: --cache-from type=gha --cache-to type=gha,mode=max
        run: make integration-test

  integration-test-mcp:
    runs-on: ubuntu-latest
    needs: [integration-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: MCP Integration test
        env:
          DOCKER_CACHE_ARGS: --cache-from type=gha --cache-to type=gha,mode=max
        run: make integration-test-mcp

  docker-push-latest:
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test, integration-test-mcp]
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push latest image
        env:
          DOCKER_REPO: ndexbio/ndex-rest
          DOCKER_TAG: latest
        run: make push-docker

  docker-push:
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test, integration-test-mcp]
    if: startsWith(github.ref, 'refs/tags/docker')

    steps:
      - uses: actions/checkout@v4

      - name: Extract Docker tag
        run: echo "DOCKER_TAG=${GITHUB_REF#refs/tags/docker}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image
        env:
          DOCKER_REPO: ndexbio/ndex-rest
        run: make push-docker
