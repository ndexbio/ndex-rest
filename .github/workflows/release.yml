name: Release

on:
  release:
    types: [published]

jobs:
  build-mcpb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Claude Desktop extension
        run: make build_claude_mcpb

      - name: Upload ndex-mcp.mcpb to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "build/ndex-mcp.mcpb" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-mcp-manifest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate McpManifest.md
        run: make mcp-manifest

      - name: Upload McpManifest to release
        run: |
          cp target/generated-resources/McpManifest.md \
             "McpManifest-${{ github.event.release.tag_name }}.md"
          gh release upload "${{ github.event.release.tag_name }}" \
            "McpManifest-${{ github.event.release.tag_name }}.md" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
