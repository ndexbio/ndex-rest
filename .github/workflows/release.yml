name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - '*'

jobs:
  build-mcpb:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Build Claude Desktop extension
        run: make build_claude_mcpb

      - name: Upload ndex-mcp.mcpb to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "build/ndex-mcp.mcpb" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-mcp-manifest:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate McpManifest.md
        run: make mcp-manifest

      - name: Upload McpManifest to release
        run: |
          cp target/generated-resources/McpManifest.md \
             "McpManifest-${{ github.event.release.tag_name }}.md"
          gh release upload "${{ github.event.release.tag_name }}" \
            "McpManifest-${{ github.event.release.tag_name }}.md" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-push:
    runs-on: ubuntu-latest

    steps:
      - name: Determine Docker tag / detect duplicate
        id: setup
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
            if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
              echo "docker_tag=$VERSION" >> $GITHUB_OUTPUT
            else
              echo "docker_tag=$TAG" >> $GITHUB_OUTPUT
            fi
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.ref_name }}"
            if gh api repos/${{ github.repository }}/releases/tags/$TAG > /dev/null 2>&1; then
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "docker_tag=$TAG" >> $GITHUB_OUTPUT
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        if: steps.setup.outputs.skip != 'true'

      - name: Set up QEMU (for arm64 cross-compilation)
        if: steps.setup.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        if: steps.setup.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          name: ndex-builder

      - name: Log in to Docker Hub
        if: steps.setup.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build multi-platform image and push manifest
        if: steps.setup.outputs.skip != 'true'
        env:
          DOCKER_REPO: ndexbio/ndex-rest
          DOCKER_TAG: ${{ steps.setup.outputs.docker_tag }}
        run: make push-docker
