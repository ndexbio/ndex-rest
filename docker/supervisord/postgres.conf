# ── PostgreSQL ────────────────────────────────────────────────────────────────
[program:postgres]
command=postgres
    -D /apps/postgres/data
    -c port=5432
    -c listen_addresses=*
user=postgres
priority=10
autostart=true
autorestart=true
startsecs=5
stopsignal=SIGTERM
stopwaitsecs=30
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
stopasgroup=true
