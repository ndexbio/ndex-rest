## NDEx database — all services communicate via localhost in the single container
NdexDBURL=jdbc:postgresql://127.0.0.1:5432/ndex
NdexDBUsername=__NDEX_DB_USER__
NdexDBDBPassword=__NDEX_DB_PASSWORD__

## System user — auto-created by NDEx server on first startup
NdexSystemUser=ndexadministrator
NdexSystemUserPassword=admin
NdexSystemUserEmail=dev-support@ndexbio.org

OrientDB-Use-Transactions=false

Feedback-Email=support@ndexbio.org
Forgot-Password-Email=support@ndexbio.org
Forgot-Password-File=/apps/ndex/data/conf/forgot-password.txt

Profile-Background-Width=670
Profile-Background-Height=200
Profile-Background-Path=/apps/ndex/data/img/background/
Profile-Image-Width=100
Profile-Image-Height=125
Profile-Image-Path=/apps/ndex/data/img/foreground/

## SMTP — MailHog (no auth) running on localhost inside the container
SMTP-Auth=false
SMTP-Host=localhost
SMTP-Port=1025
SMTP-From=dev-support@ndexbio.org

## NDEx server root and API config
NdexRoot=/apps/ndex/data
Log-Level=INFO
HostURI=http://localhost:8080
RESTAPIPrefix=/v3

## External graph query microservices. Commented out = endpoint disabled.
#NeighborhoodQueryURL=
#AdvancedQueryURL=

## Solr — running on localhost inside the container
SolrURL=http://localhost:8983/solr

BACKUP_DATABASE=FALSE

USE_GOOGLE_AUTHENTICATION=false

## Keycloak — issuer URL must match KC_HOSTNAME_URL set on the Keycloak service.
USE_KEYCLOAK_AUTHENTICATION=true
KEYCLOAK_ISSUER=http://localhost:8085/realms/ndex
ALLOWED_ADMIN_HOSTS=localhost
## RSA public key (base64 DER) — extracted by start.sh at startup from /apps/ndex/config/cert.pem
KEYCLOAK_PUBLIC_KEY=__KEYCLOAK_PUBLIC_KEY__

USER_STORAGE_LIMIT=50

NDEX_KEY=haRwav-4macbe-dyqkev
DOI_PREFIX=10.5072/FK2
DOI_CREATOR=2Uq3hRFHXGUAPznseQ+7dA==
